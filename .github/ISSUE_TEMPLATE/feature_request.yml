name: Feature Request
description: Suggest an improvement or new feature for Claude's Journal
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Claude's Journal? Describe it below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would this improve your experience with Claude's Journal?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
