name: Bug Report
description: Report a bug in Claude's Journal
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of: cat ~/Projects/personal/cast-claudes_journal/VERSION"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: "Output of: sw_vers -productVersion"
      placeholder: "macOS 15.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run install.sh
        2. Start Claude Code
        3. ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant output, logs, or screenshots.
